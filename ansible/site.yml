---
# Infrastructure-as-code playbook for the Recommendation Scoring API.
# Uses the Azure CLI (already authenticated by the calling workflow via
# azure/login) instead of the azure.azcollection Python SDK modules, which
# avoids that collection's fragile Azure SDK version-pinning issues.

- name: Provision recommendation API infrastructure on Azure
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    resource_group: rg-recsys-demo
    location: centralindia
    sql_server_name: "{{ sql_server_name_override | default('recsys-sql-srv') }}"
    sql_admin_user: recsysadmin
    sql_admin_password: "{{ sql_admin_password }}"  # supplied via pipeline secret, never committed
    sql_database_name: recsysdb
    app_service_plan: plan-recsys-demo
    webapp_name: shreeya-recsys-api

  tasks:
    - name: Ensure resource group exists
      ansible.builtin.command:
        cmd: >
          az group create
          --name {{ resource_group }}
          --location {{ location }}
      changed_when: true

    - name: Register the Microsoft.Sql resource provider
      ansible.builtin.command:
        cmd: az provider register --namespace Microsoft.Sql --wait
      changed_when: true

    - name: Provision Azure SQL logical server
      ansible.builtin.command:
        cmd: >
          az sql server create
          --resource-group {{ resource_group }}
          --name {{ sql_server_name }}
          --location {{ location }}
          --admin-user {{ sql_admin_user }}
          --admin-password "{{ sql_admin_password }}"
      register: sql_server_result
      failed_when: >
        sql_server_result.rc != 0 and
        'already exists' not in sql_server_result.stderr
      changed_when: sql_server_result.rc == 0

    - name: Allow Azure services to access the SQL server
      ansible.builtin.command:
        cmd: >
          az sql server firewall-rule create
          --resource-group {{ resource_group }}
          --server {{ sql_server_name }}
          --name AllowAzureServices
          --start-ip-address 0.0.0.0
          --end-ip-address 0.0.0.0
      register: fw_result
      failed_when: >
        fw_result.rc != 0 and
        'already exists' not in fw_result.stderr
      changed_when: fw_result.rc == 0

    - name: Provision the database on the free serverless tier
      ansible.builtin.command:
        cmd: >
          az sql db create
          --resource-group {{ resource_group }}
          --server {{ sql_server_name }}
          --name {{ sql_database_name }}
          --edition GeneralPurpose
          --family Gen5
          --capacity 1
          --compute-model Serverless
          --auto-pause-delay 60
          --min-capacity 0.5
      changed_when: true

    - name: Ensure the App Service plan exists (free Linux tier)
      ansible.builtin.command:
        cmd: >
          az appservice plan create
          --resource-group {{ resource_group }}
          --name {{ app_service_plan }}
          --is-linux
          --sku F1
      changed_when: true

    - name: Ensure the web app exists with the right runtime
      ansible.builtin.command:
        cmd: >
          az webapp create
          --resource-group {{ resource_group }}
          --name {{ webapp_name }}
          --plan {{ app_service_plan }}
          --runtime "PYTHON:3.11"
      register: webapp_result
      failed_when: >
        webapp_result.rc != 0 and
        'already exists' not in webapp_result.stderr
      changed_when: webapp_result.rc == 0

    - name: Configure app settings (build automation, SQL connection info)
      ansible.builtin.command:
        cmd: >
          az webapp config appsettings set
          --resource-group {{ resource_group }}
          --name {{ webapp_name }}
          --settings
          SCM_DO_BUILD_DURING_DEPLOYMENT=true
          SQL_SERVER_NAME={{ sql_server_name }}
          SQL_DATABASE_NAME={{ sql_database_name }}
          SQL_ADMIN_USER={{ sql_admin_user }}
      changed_when: true
